services:
  db:
    image: postgis/postgis:16-3.4
    container_name: toddy_finder_db
    environment:
      POSTGRES_DB: toddy_finder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: toddyfinder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d toddy_finder"]
      interval: 5s
      timeout: 5s
      retries: 15

  web:
    build:
      context: ./toddy_shop_backend
    container_name: toddy_finder_web
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./toddy_shop_backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
