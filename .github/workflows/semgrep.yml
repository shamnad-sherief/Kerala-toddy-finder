name: Semgrep Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          set +e
          semgrep scan \
            --config=auto \
            --config=p/django \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/owasp-top-ten \
            --text \
            --output semgrep-results.txt
          SEMGREP_EXIT=$?
          echo "---- Semgrep findings ----"
          cat semgrep-results.txt
          exit $SEMGREP_EXIT

      - name: Upload Semgrep report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.txt
