name: Frontend Lint (ESLint)

on:
  push:
    paths:
      - 'toddy_shop_frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'toddy_shop_frontend/**'
  workflow_dispatch:

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: toddy_shop_frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: toddy_shop_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings 0
